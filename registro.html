<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UFT-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <style>

      body{
        margin:0;
        background:#111;
        color:white;
        font-family:Arial, sans-serif;
      }
      .container{
        max-width:500px;
        margin:auto;
        padding:60px 20px;
        text-aling:center;
      }
      h1{
        margin-bottom:40px;
      }
      input{
        width:100%;
        padding:12px;
        margin-bottom:20px;
        border:none;
        border-radius:10px;
        box-sizing:border-box;
      }
      button{
        width:100%;
        padding:15px;
        margin-top:10px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
      }
      .crear{
        background:#2196F3;
        color:white;
      }
      .volver{
        background:#4CAF50;
        color:white;
      }
      </style>
  </head>
  <body>
    <div class="container">
      <h1>Registro</h1>
      <input id="email" type="email" placeholder="Correo electrónico:">
      <input id="password" type="password" placeholder="Contraseña:">
      <input id="confirmPassword" type="password" placeholder="Confirmar contraseña:">
      <input id="payoneer" type="email" placeholder="Correo asociado a Payoneer:">
      <input id="codigo" type="password" placeholder="Código de acceso:">
      
      <button id="crearCuentaBtn" class="crear">
        Crear cuenta
      </button>
      <button class="volver"
        onclick="window.location.href='index.html'">
        Volver atrás
      </button>
    
    </div>
    <script type="module">
      import { auth, db } from "./firebase.js";
      
      import {
        createUserWithEmailAndPassword
      } from
         "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
        
      import {
          collection,
          query,
          where,
          getDocs,
          doc,
          setDoc,
          updateDoc
      } from
      "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
    
      async function buscarCodigo(codigoIngresado) {
        console.log("Buscando documento:", codigoIngresado);
        const q= query(
        collection(db, "codigos_acceso"),
          where("codigo", "==", codigoIngresado)
          );
        const resultado= await getDocs(q);
        
        if (resultado.empty){
          return null;
        } 
        return resultado.docs[0];
      }

       const botonCrear= document.getElementById("crearCuentaBtn");
      console.log(botonCrear);
      const email= document.getElementById("email");
      const password= document.getElementById("password");
      const confirmPassword= document.getElementById("confirmPassword");
      const payoneer= document.getElementById("payoneer");
      const codigo= document.getElementById("codigo");
      
      botonCrear.addEventListener("click", async () => {
      console.log("Botón presionado");
        console.log("Código escrito:", codigo.value.trim());
      
        if(email.value.trim() === "") {
          alert("Ingrese un correo electrónico.");
          return;
        }
        if(password.value.trim() === "") {
          alert("Ingrese una contraseña.");
          return;
        }
        if (confirmPassword.value.trim() === "") {
          alert("Confirme la contraseña.");
          return;
        }
        if(password.value !== confirmPassword.value) {
          alert("Las contraseñas no coinciden.");
          return;
        }
        if(payoneer.value.trim() === "") {
        alert("ingrese su correo de payoneer.");
        return;
      }
      if(codigo.value.trim() === "") {
        alert("Ingrese el código de acceso.");
        return;
      }
        const codigoSnap= await
        buscarCodigo(codigo.value.trim());
        if (!codigoSnap) {
          alert("El código de acceso no es válido.");
          return;
        }
        const data= codigoSnap.data();
        if (!data.activo) {
          alert("El código de acceso no es válido.");
          return;
        }
        if (data.usado) {
          alert("El código de acceso no es válido.");
          return;
        }
      
        try {
         const credencial= await
         createUserWithEmailAndPassword(
           auth,
           email.value.trim(),
           password.value
           );
         const uid= credencial.user.uid;
         
         await setDoc(doc(db, "users", uid), {
           usuario_id: uid,
           email: email.value.trim(),
           payoneer: payoneer.value.trim(),
           codigo_acceso: codigo.value.trim(),
           fechaRegistro: new Date().toISOString(),
           admin: false, 
           activo: true
      });
         
         await setDoc(doc(db, "estadisticas_usuario", uid), {
           usuario_id: uid,
           tareas_realizadas: 0,
           dias_trabajados: 0,
           minutos_acumulados: 0,
           ultima_fecha_trabajo: null
      });
         
         await updateDoc(codigoSnap.ref, {
           usado: true,
           emailUsuario: email.value.trim(),
           uidUsuario: uid
      });
         
         alert("¡Cuenta creada correctamente!");
         window.location.href="inicio.html";

       }
        catch(error){
          console.error(error);
          alert("Error al crear la cuenta:" + error.message);
        }
      });
    </script>
  </body>
</html>
