<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name=viewport" content="width=device-width,initial-scale=1.0">
      <title>Términos y Condiciones</title>

    <style>

      body{
        margin:0;
        background:#111;
        color:white;
        font family:Arial, sans-serif;
      }
        .container{
        max-width:900px;
        margin:auto;
        padding:40px 20px;
      }
      h1{
        text-align:center;
        margin-bottom:30px;
      }
      h2{
        margin-top:30px;
      }
      ul{
        line-height:1.8;
      }
      .checkbox-container{
        margin-top:40px;
        front-size:18px;
      }
      input [type="checkbox"]{
        transform:scale(1.3);
        margin-right:10px;
      }
      #continuarBtn{
        display:none;
        margin-top:30px
        padding:15px 25px;
        border:none;
        border-radius:10px;
        background:#4CAF50;
        color:white;
        cursor:pointer;
        front-size:16px;
      }
      </style>
  </head>
  <body>
    <div class="container">

      
      <h1>Iniciar Sesión</h1>
      <input type="email" placeholder="Correo electrónico:">
      <input type="password" placeholder="Contraseña:">
      <input type="text" placeholder="Código de acceso:">
      <button class="login">
        Iniciar sesión
      </button>
      <button class="volver"
        onclick="window.location.href='index.html'">
        Volver atrás
      </button>

    </div>

  </body>
</html>
