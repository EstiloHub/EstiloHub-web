<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Historial de usuarios</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial,sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
margin-bottom:35px;
}

.usuario{

background:#1b1b1b;
border:1px solid #444;
border-radius:12px;
padding:20px;
margin-bottom:20px;

}

button{

width:100%;
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:15px;
font-size:16px;

}

.ver{

background:#2196F3;
color:white;
margin-bottom:10px;

}

.reactivar{

background:#2E7D32;
color:white;

}

.volver{

background:#555;
color:white;

}

</style>

</head>

<body>

<div class="container">

<h1>📁 Historial de usuarios</h1>

<div id="listaHistorial"></div>

<button
class="volver"
onclick="window.location.href='usuarios.html'">

⬅️ Volver

</button>

</div>

<script type="module">

import { db } from "./firebase.js";

import {

collection,
getDocs,
doc,
getDoc,
setDoc,
deleteDoc,
updateDoc

} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const listaHistorial = document.getElementById("listaHistorial");

async function cargarHistorial(){

listaHistorial.innerHTML = "";

const historialSnap = await getDocs(collection(db,"historial_usuarios"));

historialSnap.forEach((docu)=>{

const usuario = docu.data();

const datosUser = {

email: usuario.email,

usuario_id: usuario.usuario_id,

payoneer: usuario.payoneer,

codigo_acceso: usuario.codigo_acceso,

fechaRegistro: usuario.fecha_registro,

admin: usuario.admin,

fase: usuario.fase,

pagina_real: usuario.pagina_real,

activo: true

};

const datosEstadisticas = {

email: usuario.email,

usuario_id: usuario.usuario_id,

tareas_realizadas: usuario.tareas_realizadas,

dias_trabajados: usuario.dias_trabajados,

minutos_acumulados: usuario.minutos_acumulados,

ultima_fecha_trabajo: usuario.ultima_fecha_trabajo

};

listaHistorial.innerHTML += `

<div class="usuario">

<p><strong>📧 Email:</strong> ${usuario.email}</p>

<p><strong>🔴 Estado:</strong> Desactivado</p>

<button
class="ver"
onclick="window.location.href='perfil_usuario.html?id=${usuario.usuario_id}'">

👤 Ver perfil

</button>

<button
class="reactivar"
data-id="${docu.id}">
data-uid="${usuario.usuario_id}">

🟢 Reactivar usuario

</button>

</div>

`;

});

}

cargarHistorial();

document.addEventListener("click", async (e) => {

if (!e.target.classList.contains("reactivar")) return;

const confirmar = confirm("¿Seguro que deseas reactivar este usuario?");

if (!confirmar) return;

const id = e.target.dataset.id;

try {

const historialRef = doc(db, "historial_usuarios", id);

const historialSnap = await getDoc(historialRef);

if (!historialSnap.exists()) {

alert("No se encontró el usuario.");

return;

}

const usuario = historialSnap.data();

await setDoc(doc(db, "users", usuario.usuario_id), {

email: usuario.email,
usuario_id: usuario.usuario_id,
payoneer: usuario.payoneer,
codigo_acceso: usuario.codigo_acceso,
fechaRegistro: usuario.fecha_registro,
admin: usuario.admin,
fase: usuario.fase,
pagina_real: usuario.pagina_real,
activo: true

});

await setDoc(doc(db, "estadisticas_usuario", usuario.usuario_id), {

email: usuario.email,
usuario_id: usuario.usuario_id,
tareas_realizadas: usuario.tareas_realizadas,
dias_trabajados: usuario.dias_trabajados,
minutos_acumulados: usuario.minutos_acumulados,
ultima_fecha_trabajo: usuario.ultima_fecha_trabajo

});

await deleteDoc(historialRef);

alert("Usuario reactivado correctamente.");

location.reload();

} catch (error) {

console.error(error);

alert("Error al reactivar el usuario.");

}

});
  
</script>
  
</body>

</html>
