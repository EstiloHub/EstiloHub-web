<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Historial de usuarios</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial,sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
margin-bottom:35px;
}

.usuario{

background:#1b1b1b;
border:1px solid #444;
border-radius:12px;
padding:20px;
margin-bottom:20px;

}

button{

width:100%;
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:15px;
font-size:16px;

}

.ver{

background:#2196F3;
color:white;
margin-bottom:10px;

}

.reactivar{

background:#2E7D32;
color:white;

}

.volver{

background:#555;
color:white;

}

</style>

</head>

<body>

<div class="container">

<h1>📁 Historial de usuarios</h1>

<div id="listaHistorial"></div>

<button
class="volver"
onclick="window.location.href='usuarios.html'">

⬅️ Volver

</button>

</div>

<script type="module">

import { db } from "./firebase.js";

import {

collection,
getDocs

} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const listaHistorial = document.getElementById("listaHistorial");

async function cargarHistorial(){

listaHistorial.innerHTML = "";

const historialSnap = await getDocs(collection(db,"historial_usuarios"));

historialSnap.forEach((docu)=>{

const usuario = docu.data();

listaHistorial.innerHTML += `

<div class="usuario">

<p><strong>📧 Email:</strong> ${usuario.email}</p>

<p><strong>🔴 Estado:</strong> Desactivado</p>

<button
class="ver"
onclick="window.location.href='perfil_usuario.html?id=${usuario.usuario_id}'">

👤 Ver perfil

</button>

<button
class="reactivar"
data-id="${docu.id}">

🟢 Reactivar usuario

</button>

</div>

`;

});

}

cargarHistorial();

</script>
  
</body>

</html>
